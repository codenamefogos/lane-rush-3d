<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<title>Lane Rush 3D</title>
<style>
  :root{
    --accent:#FF5A36;
    --accent-2:#39F2C8;
    --bg-1:#0B1020;
    --bg-2:#1B2740;
    --ink:#EAF2FF;
    --muted:#7E8BB3;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden; background:var(--bg-1);
    font-family:'Rubik', system-ui, -apple-system, sans-serif;
    touch-action:none; user-select:none;
  }
  #game-canvas{
    position:fixed; inset:0; display:block; width:100%; height:100%;
  }

  /* ---------- HUD ---------- */
  #hud{
    position:fixed; inset:0; pointer-events:none; z-index:10;
    display:flex; flex-direction:column; justify-content:space-between;
    padding: max(14px, env(safe-area-inset-top)) 16px max(14px, env(safe-area-inset-bottom));
  }
  #top-bar{display:flex; justify-content:space-between; align-items:flex-start;}
  .pill{
    background:rgba(11,16,32,0.55); backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px; padding:8px 14px;
    display:flex; align-items:center; gap:8px;
  }
  #score-pill{flex-direction:column; align-items:flex-start; gap:0; min-width:84px;}
  #score-label{font-size:10px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; font-weight:600;}
  #score-value{font-size:24px; font-weight:800; color:var(--ink); font-variant-numeric:tabular-nums; line-height:1.15;}
  #best-value{font-size:11px; color:var(--accent-2); font-weight:700;}

  #coin-pill{font-size:15px; font-weight:700; color:#FFD56B;}
  #coin-pill svg{flex-shrink:0;}

  #pause-btn{
    pointer-events:auto; width:42px; height:42px; border-radius:12px;
    background:rgba(11,16,32,0.55); border:1px solid rgba(255,255,255,0.08);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  #pause-btn svg{width:18px; height:18px;}

  #speed-wrap{
    position:absolute; bottom:max(110px, calc(env(safe-area-inset-bottom) + 96px));
    left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  #speed-track{
    width:140px; height:6px; border-radius:6px; background:rgba(255,255,255,0.1); overflow:hidden;
  }
  #speed-fill{
    height:100%; width:30%; border-radius:6px;
    background:linear-gradient(90deg,var(--accent-2),var(--accent));
    transition:width .25s ease;
  }
  #speed-label{font-size:10px; letter-spacing:.1em; color:var(--muted); font-weight:600; text-transform:uppercase;}

  /* ---------- Touch controls ---------- */
  #controls{
    pointer-events:auto; display:flex; justify-content:space-between; align-items:flex-end;
  }
  .ctrl-btn{
    width:64px; height:64px; border-radius:18px;
    background:rgba(20,28,52,0.6); backdrop-filter: blur(8px);
    border:1px solid rgba(255,255,255,0.10);
    display:flex; align-items:center; justify-content:center;
    color:var(--ink); transition:transform .08s ease, background .15s ease;
  }
  .ctrl-btn:active, .ctrl-btn.active{
    transform:scale(0.9); background:rgba(255,90,54,0.35); border-color:var(--accent);
  }
  .ctrl-btn svg{width:26px; height:26px;}
  #lane-controls{display:flex; gap:12px;}
  #action-controls{display:flex; flex-direction:column; gap:12px;}
  #jump-btn{background:rgba(57,242,200,0.18); border-color:rgba(57,242,200,0.35);}
  #jump-btn:active{background:rgba(57,242,200,0.4); border-color:var(--accent-2);}

  /* ---------- Screens ---------- */
  .screen{
    position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background:radial-gradient(120% 100% at 50% 0%, rgba(57,242,200,0.10), transparent 60%),
               linear-gradient(180deg, var(--bg-2), var(--bg-1));
    padding:32px; gap:18px;
  }
  .hidden{display:none !important;}

  .logo{
    font-size:42px; font-weight:900; letter-spacing:-0.02em; color:var(--ink);
    line-height:1;
  }
  .logo span{color:var(--accent);}
  .tagline{color:var(--muted); font-size:13px; letter-spacing:.18em; text-transform:uppercase; font-weight:600; margin-top:-8px;}

  .car-preview{width:min(60vw,220px); height:auto; margin:6px 0;}

  .btn{
    appearance:none; border:none; cursor:pointer;
    font-family:inherit; font-weight:800; letter-spacing:.02em;
    border-radius:16px; padding:16px 38px; font-size:17px;
    color:#0B1020; background:linear-gradient(135deg,var(--accent-2),#7CF6D6);
    box-shadow:0 8px 24px -8px rgba(57,242,200,0.6);
    transition:transform .08s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn.secondary{
    background:transparent; color:var(--ink);
    border:1px solid rgba(255,255,255,0.18); box-shadow:none;
  }
  .btn.ghost{
    background:transparent; color:var(--muted); font-weight:600; font-size:13px;
    padding:8px 16px; box-shadow:none; letter-spacing:.06em; text-transform:uppercase;
  }

  .stats-row{display:flex; gap:28px; margin:4px 0 2px;}
  .stat{display:flex; flex-direction:column; align-items:center; gap:2px;}
  .stat-value{font-size:30px; font-weight:900; color:var(--ink); font-variant-numeric:tabular-nums;}
  .stat-label{font-size:10px; letter-spacing:.16em; color:var(--muted); text-transform:uppercase; font-weight:700;}
  .stat.gold .stat-value{color:#FFD56B;}
  .stat.best .stat-value{color:var(--accent-2);}

  .button-col{display:flex; flex-direction:column; gap:12px; width:min(78vw,300px);}

  #hint-row{display:flex; gap:18px; margin-top:6px; color:var(--muted); font-size:12px; align-items:center;}
  #hint-row .hint{display:flex; flex-direction:column; align-items:center; gap:6px;}
  #hint-row svg{width:26px; height:26px; opacity:.7;}

  #loading-bar-track{width:min(70vw,260px); height:8px; border-radius:8px; background:rgba(255,255,255,0.08); overflow:hidden; margin-top:10px;}
  #loading-bar-fill{height:100%; width:0%; background:linear-gradient(90deg,var(--accent-2),var(--accent)); border-radius:8px; transition:width .15s ease;}
  #loading-pct{font-size:12px; color:var(--muted); margin-top:8px; letter-spacing:.08em;}

  #pause-overlay{background:rgba(8,12,24,0.78); backdrop-filter:blur(6px);}

  #flash{
    position:fixed; inset:0; background:var(--accent); opacity:0; pointer-events:none; z-index:25;
    transition:opacity .12s ease;
  }
  #flash.show{opacity:.35;}

  @media (min-width:760px){
    .ctrl-btn{width:74px; height:74px;}
    .logo{font-size:54px;}
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>
<div id="flash"></div>

<!-- ============ HUD (in-game) ============ -->
<div id="hud" class="hidden">
  <div id="top-bar">
    <div class="pill" id="score-pill">
      <span id="score-label">Distance</span>
      <span id="score-value">0</span>
      <span id="best-value">Best 0</span>
    </div>
    <div class="pill" id="coin-pill">
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="9" fill="#FFD56B" stroke="#C9962A" stroke-width="1.5"/><text x="12" y="16" font-size="11" font-weight="800" text-anchor="middle" fill="#A6791F">¢</text></svg>
      <span id="coin-value">0</span>
    </div>
    <div id="pause-btn" role="button" aria-label="Pause">
      <svg viewBox="0 0 24 24" fill="none" stroke="#EAF2FF" stroke-width="2.4" stroke-linecap="round"><line x1="7" y1="5" x2="7" y2="19"/><line x1="17" y1="5" x2="17" y2="19"/></svg>
    </div>
  </div>

  <div id="speed-wrap">
    <div id="speed-track"><div id="speed-fill"></div></div>
    <span id="speed-label">Speed</span>
  </div>

  <div id="controls">
    <div id="lane-controls">
      <div class="ctrl-btn" id="left-btn" aria-label="Move left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="ctrl-btn" id="right-btn" aria-label="Move right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
    <div id="action-controls">
      <div class="ctrl-btn" id="jump-btn" aria-label="Jump">
        <svg viewBox="0 0 24 24" fill="none" stroke="#39F2C8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </div>
      <div class="ctrl-btn" id="duck-btn" aria-label="Duck / Brake">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- ============ Loading screen ============ -->
<div class="screen" id="loading-screen">
  <div class="logo">LANE<span>RUSH</span> 3D</div>
  <div class="tagline">Endless Traffic Dash</div>
  <svg class="car-preview" viewBox="0 0 220 130" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="110" cy="110" rx="92" ry="10" fill="#000" opacity="0.25"/>
    <path d="M28 78 C28 60 44 50 60 48 L78 30 C84 24 92 21 102 21 L132 21 C144 21 154 27 160 37 L172 56 C188 58 200 66 200 80 C200 92 190 100 176 100 L48 100 C36 100 28 90 28 78 Z" fill="#FF5A36"/>
    <path d="M82 48 L96 30 C99 26 104 24 110 24 L130 24 C138 24 146 29 150 37 L160 53 Z" fill="#1B2740" opacity="0.85"/>
    <circle cx="68" cy="100" r="20" fill="#0B1020"/>
    <circle cx="68" cy="100" r="9" fill="#7E8BB3"/>
    <circle cx="166" cy="100" r="20" fill="#0B1020"/>
    <circle cx="166" cy="100" r="9" fill="#7E8BB3"/>
    <rect x="40" y="62" width="14" height="6" rx="3" fill="#FFD56B"/>
    <rect x="178" y="62" width="14" height="6" rx="3" fill="#39F2C8"/>
  </svg>
  <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
  <div id="loading-pct">Loading assets… 0%</div>
</div>

<!-- ============ Start screen ============ -->
<div class="screen hidden" id="start-screen">
  <div class="logo">LANE<span>RUSH</span> 3D</div>
  <div class="tagline">Endless Traffic Dash</div>
  <div class="stats-row">
    <div class="stat best"><span class="stat-value" id="start-best">0</span><span class="stat-label">Best</span></div>
    <div class="stat gold"><span class="stat-value" id="start-coins">0</span><span class="stat-label">Coins</span></div>
  </div>
  <div class="button-col">
    <button class="btn" id="play-btn">▶ Start Driving</button>
    <button class="btn secondary" id="garage-btn">Garage</button>
  </div>
  <div id="hint-row">
    <div class="hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="#EAF2FF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Swipe / A D</span>
    </div>
    <div class="hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="#39F2C8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      <span>Swipe Up / Space</span>
    </div>
    <div class="hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="#EAF2FF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      <span>Swipe Down / S</span>
    </div>
  </div>
</div>

<!-- ============ Garage screen ============ -->
<div class="screen hidden" id="garage-screen">
  <div class="logo" style="font-size:32px;">GARAGE</div>
  <div class="stats-row" style="margin-bottom:6px;">
    <div class="stat gold"><span class="stat-value" id="garage-coins">0</span><span class="stat-label">Coins</span></div>
  </div>
  <div id="car-grid" style="display:grid; grid-template-columns:repeat(2,1fr); gap:14px; width:min(86vw,360px);"></div>
  <button class="btn ghost" id="back-btn">← Back to Menu</button>
</div>

<!-- ============ Game Over screen ============ -->
<div class="screen hidden" id="gameover-screen">
  <div class="logo" style="font-size:34px;">CRASHED!</div>
  <div class="stats-row">
    <div class="stat"><span class="stat-value" id="final-score">0</span><span class="stat-label">Distance</span></div>
    <div class="stat gold"><span class="stat-value" id="final-coins">0</span><span class="stat-label">Coins</span></div>
    <div class="stat best"><span class="stat-value" id="final-best">0</span><span class="stat-label">Best</span></div>
  </div>
  <div id="new-best-badge" class="hidden" style="color:#FFD56B; font-weight:800; letter-spacing:.1em; font-size:13px; text-transform:uppercase;">★ New Best! ★</div>
  <div class="button-col">
    <button class="btn" id="retry-btn">↻ Try Again</button>
    <button class="btn secondary" id="menu-btn">Main Menu</button>
  </div>
</div>

<!-- ============ Pause screen ============ -->
<div class="screen hidden" id="pause-screen" style="background:rgba(8,12,24,0.82); backdrop-filter:blur(6px); z-index:40;">
  <div class="logo" style="font-size:32px;">PAUSED</div>
  <div class="button-col">
    <button class="btn" id="resume-btn">▶ Resume</button>
    <button class="btn secondary" id="quit-btn">Quit to Menu</button>
  </div>
</div>

<!-- Three.js via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
